spring:
  datasource:
    url: ${env.DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5433/betterlearn?stringtype=unspecified}}
    username: ${env.DATABASE_USERNAME:${DATABASE_USERNAME:betterlearn}}
    password: ${env.DATABASE_PASSWORD:${DATABASE_PASSWORD:betterlearn}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${env.GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
            client-secret: ${env.GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:}}
            scope: email, profile

app:
  google:
    redirect-uri: ${env.GOOGLE_REDIRECT_URI:${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}}
    frontend-callback: ${env.GOOGLE_FRONTEND_CALLBACK:${GOOGLE_FRONTEND_CALLBACK:http://localhost:4200/auth/callback}}
  jwt:
    secret: ${env.JWT_SECRET:${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}}
    expiration-ms: 604800000  # 7 days
  gemini:
    api-key: ${env.GEMINI_API_KEY:${GEMINI_API_KEY:}}
    model: gemini-2.5-flash

aws:
  access-key-id: ${env.AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
  secret-access-key: ${env.AWS_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
  region: ${env.AWS_REGION:${AWS_REGION:us-east-2}}
  s3:
    bucket: ${env.AWS_S3_BUCKET:${AWS_S3_BUCKET:}}

server:
  port: 8080
