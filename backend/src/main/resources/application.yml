spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/betterlearn
    username: betterlearn
    password: betterlearn
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

app:
  google:
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
    frontend-callback: ${GOOGLE_FRONTEND_CALLBACK:http://localhost:4200/auth/callback}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
    expiration-ms: 86400000  # 24 hours
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash

server:
  port: 8080
