<div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
  <!-- Problem info -->
  <div class="mb-6">
    <h2 class="text-lg font-semibold text-gray-900">Review Problem</h2>
    <p class="mt-2 text-sm font-medium text-gray-700">{{ problem().title }}</p>
    <a [href]="problem().url" target="_blank" rel="noopener"
       class="mt-1 inline-flex items-center gap-1 text-xs text-blue-500 hover:text-blue-600 transition-colors">
      Open in LeetCode
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
    </a>
  </div>

  <!-- Rating label -->
  <p class="text-xs font-medium text-gray-400 mb-3">How did it go?</p>

  <!-- Anki-style buttons -->
  <div class="grid grid-cols-2 gap-2.5">
    @for (btn of buttons; track btn.quality) {
      <button (click)="submit(btn.quality)" [disabled]="submitting"
              [class]="'flex flex-col items-center gap-1 py-3 px-4 rounded-xl border text-sm font-medium transition-all disabled:opacity-40 ' + btn.color">
        <span class="text-base">{{ btn.label }}</span>
        <span class="text-[10px] opacity-60">{{ btn.desc }}</span>
      </button>
    }
  </div>

  <!-- Cancel -->
  <button (click)="cancelled.emit()"
          class="w-full mt-4 py-2 text-xs text-gray-400 hover:text-gray-600 transition-colors">
    Cancel
  </button>
</div>
