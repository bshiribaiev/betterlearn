<div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
  <!-- Header with problem info -->
  <div class="px-8 pt-8 pb-6">
    <p class="text-lg font-semibold text-gray-900">{{ problem().title }}</p>
    <a [href]="problem().url" target="_blank" rel="noopener"
       class="mt-2 inline-flex items-center gap-1 text-sm text-gray-400 hover:text-blue-500 transition-colors">
      Open in LeetCode
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
    </a>
  </div>

  <!-- Rating buttons -->
  <div class="px-8 pb-8">
    <div class="flex gap-3">
      @for (btn of buttons; track btn.quality) {
        <button (click)="submit(btn.quality)" [disabled]="submitting"
                [class]="'flex-1 flex items-center justify-center py-5 rounded-xl border transition-all disabled:opacity-40 cursor-pointer ' + btn.color">
          <span class="text-base font-semibold">{{ btn.label }}</span>
        </button>
      }
    </div>
  </div>

  <!-- Cancel -->
  <button (click)="cancelled.emit()"
          class="w-full py-4 text-sm font-medium text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition-colors border-t border-gray-100 cursor-pointer">
    Cancel
  </button>
</div>
