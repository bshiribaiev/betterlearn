<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
  <h2 class="text-lg font-semibold text-gray-900 mb-5">Add Problem</h2>

  @if (error) {
    <div class="mb-4 p-3 text-sm bg-red-50 text-red-600 rounded-xl">{{ error }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1.5">Problem URL</label>
      <input formControlName="url" type="url"
             class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400/20 focus:border-sky-400 transition-colors"
             placeholder="https://leetcode.com/problems/two-sum/" />
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1.5">Title (auto-parsed if empty)</label>
      <input formControlName="title" type="text"
             class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400/20 focus:border-sky-400 transition-colors"
             placeholder="Two Sum" />
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1.5">Notes (optional)</label>
      <textarea formControlName="notes" rows="3"
                class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400/20 focus:border-sky-400 transition-colors resize-none"
                placeholder="Key insight, approach used..."></textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="button" (click)="cancelled.emit()"
              class="flex-1 py-2.5 text-sm font-medium text-gray-600 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors">
        Cancel
      </button>
      <button type="submit" [disabled]="form.invalid"
              class="flex-1 py-2.5 text-sm font-medium text-white bg-sky-500 rounded-xl hover:bg-sky-600 disabled:opacity-40 transition-colors">
        Add Problem
      </button>
    </div>
  </form>
</div>
