<div class="max-w-2xl mx-auto px-6 py-8">
  @if (terms.length === 0) {
    <div class="text-center py-16">
      <p class="text-gray-400 text-sm">No terms found.</p>
      <a routerLink="/quiz" class="text-sky-500 hover:text-sky-600 text-sm mt-2 inline-block">Back to Topics</a>
    </div>
  } @else {
    <!-- Progress -->
    <div class="flex items-center justify-between mb-6">
      <span class="text-sm text-gray-400">{{ currentIndex + 1 }} / {{ terms.length }}</span>
      @if (subtitle) {
        <span class="text-sm text-gray-400">{{ subtitle }}</span>
      }
    </div>
    <div class="w-full bg-gray-100 rounded-full h-1 mb-8">
      <div class="bg-sky-500 h-1 rounded-full transition-all" [style.width.%]="((currentIndex + 1) / terms.length) * 100"></div>
    </div>

    <!-- Card -->
    <div class="border border-gray-200 rounded-2xl p-8 min-h-[280px] flex flex-col justify-center items-center text-center">
      <p class="text-2xl font-semibold text-gray-900 mb-4">{{ terms[currentIndex].term }}</p>

      @if (revealed) {
        <div class="border-t border-gray-200 pt-4 w-full">
          <p class="text-lg text-gray-600 mb-6">{{ terms[currentIndex].definition }}</p>
          <!-- Correct / Wrong -->
          <div class="flex justify-center gap-4">
            <button (click)="markAndAdvance(false)"
                    class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-red-200 text-red-500 font-medium hover:bg-red-50 transition-colors cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              Wrong
            </button>
            <button (click)="markAndAdvance(true)"
                    class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-emerald-200 text-emerald-500 font-medium hover:bg-emerald-50 transition-colors cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              Correct
            </button>
          </div>
        </div>
      } @else {
        <button (click)="reveal()"
                class="mt-4 px-6 py-2.5 text-sm font-medium bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors cursor-pointer">
          Show Definition
        </button>
      }
    </div>
  }
</div>
