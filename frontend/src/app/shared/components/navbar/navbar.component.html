  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a routerLink="/" class="text-lg font-semibold text-gray-900 tracking-tight">betterlearn</a>
      <div class="flex items-center gap-1">
        <a routerLink="/"
           class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 rounded-lg transition-colors">Dashboard</a>
        <a routerLink="/quiz"
           class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 rounded-lg transition-colors">Subjects</a>
