@if (isLoggedIn$ | async) {
  <nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a routerLink="/" class="text-lg font-bold text-blue-600">BetterLearn</a>
      <a routerLink="/" routerLinkActive="text-blue-600" [routerLinkActiveOptions]="{exact: true}"
         class="text-gray-600 hover:text-gray-900">Dashboard</a>
      <a routerLink="/leetcode" routerLinkActive="text-blue-600"
         class="text-gray-600 hover:text-gray-900">LeetCode</a>
      <a routerLink="/quiz" routerLinkActive="text-blue-600"
         class="text-gray-600 hover:text-gray-900">Quiz</a>
    </div>
    <button (click)="logout()" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
  </nav>
}
