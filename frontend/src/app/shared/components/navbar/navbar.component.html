@if (isLoggedIn$ | async) {
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-5xl mx-auto px-6 py-3 grid grid-cols-3 items-center">
    <a routerLink="/dashboard" class="flex items-center gap-2 text-lg font-semibold text-gray-900 tracking-tight">
      <img src="favicon.svg" alt="" class="w-6 h-6">
      betterlearn
    </a>
    <div class="flex items-center justify-center gap-1">
      <a routerLink="/dashboard"
         class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 rounded-lg transition-colors">Dashboard</a>
      <a routerLink="/quiz"
         class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 rounded-lg transition-colors">Subjects</a>
      <a routerLink="/leetcode"
         class="px-3 py-1.5 text-sm font-medium text-gray-500 hover:text-gray-900 rounded-lg transition-colors">LeetCode</a>
    </div>
    <button (click)="logout()"
            class="justify-self-end text-sm text-gray-400 hover:text-gray-600 transition-colors">
      Logout
    </button>
    </div>
  </nav>
}
